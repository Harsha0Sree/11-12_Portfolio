<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="screenframe">
      <nav class="navbar">
        <div class="left">
          <img src="" alt="logo" />
        </div>
        <ul class="navigations">
          <li>Home</li>
          <li>About</li>
          <li>Projects</li>
          <li>Blog</li>
        </ul>
        <ul class="navigations_right">
          <button>Twitter</button>
          <button>Instagram</button>
        </ul>
      </nav>
      <main class="grid">
        <section class="hero">
          <div class="images">
            <img class="img-1" src="" alt="img1" />
            <img class="img-2" src="" alt="img2" />
            <img class="img-3" src="" alt="img3" />
            <img class="img-4" src="" alt="img4" />
            <img class="img-5" src="" alt="img5" />
          </div>
          <div class="hero-text">
            <p>11:12</p>
            <p>portfolio</p>
          </div>
        </section>
        <section class="my-work">
          <div class="grid-container_1">
            <div class="box" style="grid-area: box1;">1</div>
            <div class="box" style="grid-area: box2;">2</div>
            <div class="box" style="grid-area: box3;">3</div>
            <div class="box" style="grid-area: box4;">4</div>
            <div class="box" style="grid-area: box5;">5</div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
